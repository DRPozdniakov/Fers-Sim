<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Roadmap</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Open Sans', sans-serif; background: #f5f5f5; min-height: 100vh; padding: 40px; }
        .container { max-width: 1900px; margin: 0 auto; background: white; padding: 40px 50px; box-shadow: 0 2px 20px rgba(0,0,0,0.08); border-radius: 8px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; font-weight: 300; color: #333; letter-spacing: 2px; }
        .brand { font-size: 0.85rem; font-weight: 600; color: #555; }
        .phase-labels { display: flex; justify-content: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .phase-label { font-size: 0.55rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 5px 14px; border-radius: 20px; }
        .timeline-wrapper { position: relative; height: 600px; margin: 10px 30px; }
        .past-overlay { position: absolute; top: 0; left: 0; height: 100%; background: linear-gradient(90deg, rgba(200,200,200,0.2) 0%, rgba(200,200,200,0.05) 100%); z-index: 1; border-right: 2px dashed #aaa; }
        .now-marker { position: absolute; top: 0; bottom: 0; z-index: 25; display: flex; flex-direction: column; align-items: center; }
        .now-label { background: #e74c3c; color: white; padding: 3px 10px; border-radius: 10px; font-size: 0.5rem; font-weight: 700; letter-spacing: 1px; box-shadow: 0 2px 8px rgba(231,76,60,0.4); }
        .now-line { width: 2px; flex: 1; background: #e74c3c; margin-top: 4px; }
        .now-date { background: #e74c3c; color: white; padding: 2px 6px; border-radius: 6px; font-size: 0.4rem; font-weight: 600; margin-top: 4px; }
        .bubble-track { position: absolute; top: 50%; left: 0; right: 0; height: 0; }
        .bubble { position: absolute; border-radius: 50%; opacity: 0.35; top: 0; }
        .timeline-line { position: absolute; top: 50%; left: 0; right: 0; height: 4px; background: repeating-linear-gradient(90deg, white 0px, white 6px, transparent 6px, transparent 12px); transform: translateY(-50%); z-index: 5; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
        .months { position: absolute; top: calc(50% + 70px); left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 5px; z-index: 10; }
        .month { font-size: 0.5rem; font-weight: 600; color: #666; letter-spacing: 0.5px; }
        .month.past { color: #27ae60; }
        .month.current { color: #e74c3c; font-weight: 700; }
        .task { position: absolute; width: 65px; text-align: center; z-index: 20; }
        .task-connector { position: absolute; width: 1px; background: #bbb; left: 50%; transform: translateX(-50%); }
        .task-dot { width: 6px; height: 6px; background: white; border: 2px solid #888; border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); z-index: 6; }
        .task-circle { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 3px auto; font-size: 9px; font-weight: 700; color: white; box-shadow: 0 3px 10px rgba(0,0,0,0.2); position: relative; }
        .task.below .task-circle { margin: 3px auto 0 auto; order: 2; }
        .task-content { order: 1; }
        .task.below { display: flex; flex-direction: column; }
        .task-label { font-size: 0.4rem; font-weight: 700; color: #333; text-transform: uppercase; letter-spacing: 0.2px; margin-bottom: 1px; line-height: 1.1; }
        .task-dates { font-size: 0.35rem; color: #888; font-weight: 500; }
        .task-underline { width: 14px; height: 2px; margin: 2px auto; border-radius: 2px; }
        .completed .task-circle { background: linear-gradient(135deg, #27ae60, #2ecc71) !important; }
        .completed .task-circle::after { content: '\2713'; position: absolute; top: -3px; right: -3px; width: 12px; height: 12px; background: white; border-radius: 50%; border: 2px solid #27ae60; font-size: 8px; color: #27ae60; display: flex; align-items: center; justify-content: center; }
        .in-progress .task-circle { animation: pulse 2s infinite; border: 3px solid #f39c12; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 3px 10px rgba(0,0,0,0.2); } 50% { box-shadow: 0 0 18px rgba(243,156,18,0.6); } }
        .milestone .task-circle { background: linear-gradient(135deg, #ffd700, #ff8c00) !important; width: 50px; height: 50px; font-size: 10px; border: 2px solid white; box-shadow: 0 4px 12px rgba(255,140,0,0.4); }
        .footer { text-align: center; margin-top: 15px; padding-top: 12px; border-top: 1px solid #eee; font-size: 0.65rem; color: #999; }
        .footer span { font-weight: 600; color: #666; }
        .legend { display: flex; justify-content: center; gap: 20px; margin-top: 8px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.5rem; color: #666; }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

        .detailed-roadmap { margin-top: 30px; padding-top: 25px; border-top: 2px solid #eee; }
        .phase-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 15px; }
        .phase-card { background: #fafafa; border-radius: 8px; overflow: hidden; }
        .phase-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; }
        .phase-marker { color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; font-weight: 700; }
        .phase-title { font-size: 0.7rem; font-weight: 700; color: #333; text-transform: uppercase; letter-spacing: 0.5px; flex: 1; }
        .phase-timing { font-size: 0.55rem; color: #666; font-weight: 600; background: white; padding: 3px 8px; border-radius: 10px; }
        .phase-status { font-size: 0.5rem; font-weight: 700; padding: 3px 8px; border-radius: 10px; text-transform: uppercase; }
        .phase-status.current { background: #e74c3c; color: white; }
        .phase-content { padding: 12px 14px; }
        .workstream { margin-bottom: 12px; }
        .workstream:last-child { margin-bottom: 0; }
        .workstream-title { font-size: 0.55rem; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid #e0e0e0; }
        .task-tree { font-family: 'Consolas', 'Monaco', monospace; font-size: 0.55rem; color: #444; line-height: 1.6; }
        .tree-item { white-space: nowrap; }
        .tree-item.sub { color: #666; padding-left: 4px; }
        .status-dot { margin-left: 4px; }
        .status-dot.planned { color: #999; }
        .status-dot.in-progress { color: #f39c12; }
        .status-dot.complete { color: #27ae60; }
        .price { color: #27ae60; font-weight: 600; font-size: 0.5rem; margin-left: 4px; }
        .expenses-section { margin-top: 25px; padding-top: 20px; border-top: 2px solid #eee; }
        .expenses-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-top: 15px; }
        .expense-card { background: #fafafa; border-radius: 8px; padding: 15px; border-left: 4px solid #555; }
        .expense-card h4 { font-size: 0.65rem; font-weight: 700; color: #333; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
        .expense-table { width: 100%; font-size: 0.55rem; }
        .expense-table td { padding: 4px 0; }
        .expense-table td:last-child { text-align: right; font-weight: 600; color: #27ae60; }
        .expense-total { border-top: 1px solid #ddd; font-weight: 700; }
        .expense-total td:last-child { color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="projectTitle"></h1>
            <div class="brand" id="timelineRange"></div>
        </div>
        <div class="phase-labels" id="phaseLabels"></div>
        <div class="timeline-wrapper" id="timeline"></div>
        <div class="footer">
            <span id="footerProject"></span>
            <div class="legend">
                <div class="legend-item"><div class="legend-dot" style="background:#27ae60"></div> Complete</div>
                <div class="legend-item"><div class="legend-dot" style="background:#f39c12"></div> In Progress</div>
                <div class="legend-item"><div class="legend-dot" style="background:#bbb"></div> Planned</div>
                <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#ffd700,#ff8c00)"></div> Milestone</div>
                <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div> Current</div>
            </div>
        </div>

        <!-- Detailed Roadmap Breakdown -->
        {{DETAILED_ROADMAP_HTML}}

        <!-- Business Expenses Section -->
        {{EXPENSES_HTML}}
    </div>

<script>
var ROADMAP_DATA = {{ROADMAP_JSON}};

function render() {
    var data = ROADMAP_DATA;
    var startDate = new Date(data.timeline.start);
    var endDate = new Date(data.timeline.end);
    var nowDate = new Date(data.timeline.now);
    var totalDays = (endDate - startDate) / (1000 * 60 * 60 * 24);
    var nowDays = (nowDate - startDate) / (1000 * 60 * 60 * 24);
    var nowPercent = Math.max(0, Math.min(100, (nowDays / totalDays) * 100));

    var tierOffsets = {
        1: { top: 5, connector: 220 },
        2: { top: 85, connector: 140 },
        3: { top: 165, connector: 60 }
    };

    var monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

    document.getElementById('projectTitle').textContent = data.project + ' \u2014 PROJECT TIMELINE';
    var startLabel = monthNames[startDate.getMonth()] + ' ' + startDate.getFullYear();
    var endLabel = monthNames[endDate.getMonth()] + ' ' + endDate.getFullYear();
    document.getElementById('timelineRange').textContent = startLabel + ' \u2192 ' + endLabel;
    document.getElementById('footerProject').textContent = data.project + (data.subtitle ? ' \u2014 ' + data.subtitle : '');

    var phaseLabels = document.getElementById('phaseLabels');
    data.phases.forEach(function(p) {
        var span = document.createElement('span');
        span.className = 'phase-label';
        span.style.background = p.color + '25';
        span.style.color = p.color;
        span.textContent = p.name;
        phaseLabels.appendChild(span);
    });

    var timeline = document.getElementById('timeline');
    var phaseColors = {};
    data.phases.forEach(function(p) { phaseColors[p.id] = p.color; });

    if (nowPercent > 0) {
        var past = document.createElement('div');
        past.className = 'past-overlay';
        past.style.width = nowPercent + '%';
        timeline.appendChild(past);
    }

    var now = document.createElement('div');
    now.className = 'now-marker';
    now.style.left = nowPercent + '%';
    var nowDateLabel = monthNames[nowDate.getMonth()] + ' ' + nowDate.getDate() + " '" + String(nowDate.getFullYear()).slice(2);
    now.innerHTML = '<div class="now-label">NOW</div><div class="now-line"></div><div class="now-date">' + nowDateLabel + '</div>';
    timeline.appendChild(now);

    var bubbleTrack = document.createElement('div');
    bubbleTrack.className = 'bubble-track';
    data.tasks.forEach(function(task) {
        var taskMid = new Date((new Date(task.start).getTime() + new Date(task.end).getTime()) / 2);
        var taskDays = (taskMid - startDate) / (1000 * 60 * 60 * 24);
        var taskPercent = Math.max(2, Math.min(98, (taskDays / totalDays) * 100));
        var durationDays = (new Date(task.end) - new Date(task.start)) / (1000 * 60 * 60 * 24);
        var bubble = document.createElement('div');
        bubble.className = 'bubble';
        var size = 50 + (durationDays / 365) * 100;
        bubble.style.width = size + 'px';
        bubble.style.height = size + 'px';
        bubble.style.background = phaseColors[task.phase] || '#888';
        bubble.style.left = taskPercent + '%';
        bubble.style.transform = 'translate(-50%, -50%)';
        bubbleTrack.appendChild(bubble);
    });
    timeline.appendChild(bubbleTrack);

    var line = document.createElement('div');
    line.className = 'timeline-line';
    timeline.appendChild(line);

    var monthsDiv = document.createElement('div');
    monthsDiv.className = 'months';
    var months = [];
    var current = new Date(startDate);
    while (current <= endDate) {
        months.push({
            label: monthNames[current.getMonth()] + (current.getMonth() === 0 || current.getTime() === startDate.getTime() ? " '" + String(current.getFullYear()).slice(2) : ''),
            date: new Date(current)
        });
        current.setMonth(current.getMonth() + 1);
    }
    months.forEach(function(m) {
        var div = document.createElement('div');
        div.className = 'month';
        if (m.date < nowDate) div.classList.add('past');
        if (m.date.getMonth() === nowDate.getMonth() && m.date.getFullYear() === nowDate.getFullYear()) div.classList.add('current');
        div.textContent = m.label;
        monthsDiv.appendChild(div);
    });
    timeline.appendChild(monthsDiv);

    data.tasks.forEach(function(task) {
        var taskMid = new Date((new Date(task.start).getTime() + new Date(task.end).getTime()) / 2);
        var taskDays = (taskMid - startDate) / (1000 * 60 * 60 * 24);
        var taskPercent = Math.max(3, Math.min(97, (taskDays / totalDays) * 100));
        var tier = task.tier || 1;
        var offset = tierOffsets[tier] || tierOffsets[1];
        var div = document.createElement('div');
        div.className = 'task ' + task.position + ' ' + task.status;
        div.style.left = taskPercent + '%';
        div.style.transform = 'translateX(-50%)';
        if (task.position === 'above') { div.style.top = offset.top + 'px'; }
        else { div.style.bottom = offset.top + 'px'; }
        var color = phaseColors[task.phase] || '#888';
        var circleStyle = 'background: linear-gradient(135deg, ' + color + ', ' + color + 'dd)';
        var startMonth = monthNames[new Date(task.start).getMonth()];
        var endMonth = monthNames[new Date(task.end).getMonth()];
        var endYear = String(new Date(task.end).getFullYear()).slice(2);
        var dateStr = startMonth + '-' + endMonth + "'" + endYear;
        var connectorHeight = offset.connector;
        if (task.position === 'above') {
            div.innerHTML = '<div class="task-circle" style="' + circleStyle + '">' + task.code + '</div><div class="task-content"><div class="task-label">' + task.name + '</div><div class="task-underline" style="background: ' + color + '"></div><div class="task-dates">' + dateStr + '</div></div><div class="task-connector" style="top: 100%; height: ' + connectorHeight + 'px;"></div><div class="task-dot" style="top: calc(100% + ' + connectorHeight + 'px);"></div>';
        } else {
            div.innerHTML = '<div class="task-connector" style="bottom: 100%; height: ' + connectorHeight + 'px;"></div><div class="task-dot" style="bottom: calc(100% + ' + connectorHeight + 'px);"></div><div class="task-content"><div class="task-label">' + task.name + '</div><div class="task-underline" style="background: ' + color + '"></div><div class="task-dates">' + dateStr + '</div></div><div class="task-circle" style="' + circleStyle + '">' + task.code + '</div>';
        }
        timeline.appendChild(div);
    });

    (data.milestones || []).forEach(function(ms) {
        var msDate = new Date(ms.date);
        var msDays = (msDate - startDate) / (1000 * 60 * 60 * 24);
        var msPercent = Math.max(3, Math.min(97, (msDays / totalDays) * 100));
        var tier = ms.tier || 1;
        var offset = tierOffsets[tier] || tierOffsets[1];
        var div = document.createElement('div');
        div.className = 'task ' + ms.position + ' milestone';
        div.style.left = msPercent + '%';
        div.style.transform = 'translateX(-50%)';
        if (ms.position === 'above') { div.style.top = offset.top + 'px'; }
        else { div.style.bottom = offset.top + 'px'; }
        var dateLabel = monthNames[msDate.getMonth()] + "'" + String(msDate.getFullYear()).slice(2);
        var connectorHeight = offset.connector;
        if (ms.position === 'above') {
            div.innerHTML = '<div class="task-circle">' + ms.code + '</div><div class="task-content"><div class="task-label">' + ms.name + '</div><div class="task-underline" style="background: #ff8c00"></div><div class="task-dates">' + dateLabel + '</div></div><div class="task-connector" style="top: 100%; height: ' + connectorHeight + 'px;"></div><div class="task-dot" style="top: calc(100% + ' + connectorHeight + 'px);"></div>';
        } else {
            div.innerHTML = '<div class="task-connector" style="bottom: 100%; height: ' + connectorHeight + 'px;"></div><div class="task-dot" style="bottom: calc(100% + ' + connectorHeight + 'px);"></div><div class="task-content"><div class="task-label">' + ms.name + '</div><div class="task-underline" style="background: #ff8c00"></div><div class="task-dates">' + dateLabel + '</div></div><div class="task-circle">' + ms.code + '</div>';
        }
        timeline.appendChild(div);
    });
}

document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
